name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.releases_created }}

      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs.releases_created }}
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created }}
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm build
        if: ${{ steps.release.outputs.releases_created }}

      # Authentication via OIDC trusted publishers — see https://docs.npmjs.com/trusted-publishers
      # pnpm publish (not npm publish) rewrites the pnpm `workspace:` protocol in dependencies
      # to concrete semver ranges so external consumers can install the published packages.
      - name: Publish released packages
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          echo '${{ steps.release.outputs.paths_released }}' | jq -r '.[]' | while read path; do
            echo "Publishing $path"
            (cd "$path" && pnpm publish --no-git-checks --provenance --access public)
          done
