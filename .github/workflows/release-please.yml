name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.releases_created }}

      - uses: pnpm/action-setup@v6
        if: ${{ steps.release.outputs.releases_created }}
        with:
          version: 9.15.0

      # Node 24 bundles npm 11.x, which is required for OIDC trusted publisher
      # token exchange. Pinned here for the publish path only; .nvmrc still
      # governs CI (lint/test/build) and developer environments.
      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.releases_created }}
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.releases_created }}

      - run: pnpm build
        if: ${{ steps.release.outputs.releases_created }}

      # Authentication via OIDC trusted publishers — see https://docs.npmjs.com/trusted-publishers
      - name: Publish released packages
        if: ${{ steps.release.outputs.releases_created }}
        run: |
          echo '${{ steps.release.outputs.paths_released }}' | jq -r '.[]' | while read path; do
            echo "Publishing $path"
            (cd "$path" && npm publish --provenance --access public)
          done
